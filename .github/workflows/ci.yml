name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run application and service tests
        run: go test ./app/... ./services/...

      - name: Run gateway tests
        run: go test ./gateway/...

      - name: Run integration tests
        run: go test ./gateway/integration/... ./test/integration/...
