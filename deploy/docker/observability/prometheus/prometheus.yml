global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: meshcart-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9092"]

  - job_name: meshcart-user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: meshcart-product-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9093"]

  - job_name: meshcart-cart-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9094"]

  - job_name: meshcart-inventory-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9095"]
