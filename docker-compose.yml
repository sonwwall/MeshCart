services:
  mysql:
    image: mysql:8.4
    container_name: meshcart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 2FaJkFtkMkC3yeBK
      MYSQL_DATABASE: meshcart_user
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "3306:3306"
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/docker/mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - meshcart

  consul:
    image: hashicorp/consul:1.20
    container_name: meshcart-consul
    restart: unless-stopped
    command: ["agent", "-server", "-bootstrap-expect=1", "-ui", "-client=0.0.0.0"]
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    volumes:
      - consul_data:/consul/data
    networks:
      - meshcart

  dtm:
    image: yedf/dtm:1.19.0
    container_name: meshcart-dtm
    restart: unless-stopped
    environment:
      STORE_DRIVER: boltdb
      LOG_LEVEL: info
      HTTP_PORT: 36789
      GRPC_PORT: 36790
      JSON_RPC_PORT: 36791
    ports:
      - "36789:36789"
      - "36790:36790"
      - "36791:36791"
    volumes:
      - dtm_data:/app
    networks:
      - meshcart

  redis:
    image: redis:7.4-alpine
    container_name: meshcart-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - meshcart

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    container_name: meshcart-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - meshcart

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: meshcart-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.5.2
    container_name: meshcart-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger
    networks:
      - observability

  loki:
    image: grafana/loki:3.4.2
    container_name: meshcart-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./deploy/docker/observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    networks:
      - observability

  promtail:
    image: grafana/promtail:3.4.2
    container_name: meshcart-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/docker/observability/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./deploy/docker/observability/promtail/positions.yaml:/tmp/positions.yaml
      - ./logs:/workspace/logs:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.65.0
    container_name: meshcart-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.119.0
    container_name: meshcart-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4319:4317"   # OTLP gRPC ingest (apps -> collector)
      - "4320:4318"   # OTLP HTTP ingest (apps -> collector)
      - "9464:9464"   # Prometheus exporter endpoint
    volumes:
      - ./deploy/docker/observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      - jaeger
      - loki
    networks:
      - observability

volumes:
  mysql_data:
  consul_data:
  dtm_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  meshcart:
    name: meshcart
  observability:
    name: meshcart-observability
